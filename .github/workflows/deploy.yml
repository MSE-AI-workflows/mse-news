name: Deploy to KnowledgeHub

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/deploy.yml"

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -e

            cd ~/mse-news
            git pull origin main

            # Backend: rebuild image and restart container
            cd backend
            docker build -t mse-backend .
            docker stop mse-backend 2>/dev/null || true
            docker rm mse-backend 2>/dev/null || true
            docker run -d \
              --name mse-backend \
              --network mse-network \
              -p 4000:4000 \
              --env-file .env \
              -v "$(pwd)/uploads:/app/uploads" \
              mse-backend

            # Frontend: install deps and rebuild static assets
            cd ../frontend
            npm ci
            npm run build

